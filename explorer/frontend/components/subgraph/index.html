<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }

      #graph-shell {
        height: 540px;
        border: 1px solid #d9dee7;
        border-radius: 14px;
        background:
          radial-gradient(circle at 20% 20%, rgba(53, 91, 83, 0.10), transparent 28%),
          linear-gradient(135deg, #fbfaf6 0%, #eef3f0 100%);
        overflow: hidden;
        position: relative;
      }

      #clear-selection {
        position: absolute;
        top: 12px;
        right: 12px;
        z-index: 2;
        border: 1px solid rgba(35, 49, 43, 0.18);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.9);
        color: #20302a;
        cursor: pointer;
        font: 12px/1 sans-serif;
        padding: 8px 11px;
      }

      #reset-view {
        position: absolute;
        top: 48px;
        right: 12px;
        z-index: 2;
        border: 1px solid rgba(35, 49, 43, 0.18);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.9);
        color: #20302a;
        cursor: pointer;
        font: 12px/1 sans-serif;
        padding: 8px 11px;
      }

      #reset-view:hover {
        background: #ffffff;
        border-color: rgba(35, 49, 43, 0.32);
      }

      #clear-selection:hover {
        background: #ffffff;
        border-color: rgba(35, 49, 43, 0.32);
      }

      #legend {
        position: absolute;
        top: 12px;
        left: 14px;
        z-index: 2;
        display: flex;
        gap: 10px;
        align-items: center;
        border: 1px solid rgba(35, 49, 43, 0.12);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.82);
        color: #20302a;
        font: 11px/1 sans-serif;
        padding: 7px 10px;
      }

      .legend-mark {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 999px;
        margin-right: 4px;
        vertical-align: -1px;
      }

      .legend-path {
        background: #c05a2b;
      }

      .legend-focus {
        background: #2f6f63;
      }

      .legend-context {
        background: #d8a03d;
      }

      #kg-subgraph {
        width: 100%;
        height: 455px;
        cursor: grab;
        user-select: none;
      }

      #kg-subgraph.panning {
        cursor: grabbing;
      }

      #node-details {
        position: absolute;
        left: 16px;
        right: 16px;
        bottom: 12px;
        min-height: 46px;
        padding: 10px 12px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.88);
        border: 1px solid rgba(35, 49, 43, 0.14);
        font: 13px/1.35 sans-serif;
        color: #20302a;
      }

      .edge {
        stroke: #9ba8a1;
        stroke-width: 1.5;
        opacity: 0.55;
      }

      .edge.path {
        stroke: #c05a2b;
        stroke-width: 4;
        opacity: 0.98;
      }

      .edge.semantic {
        stroke: #5577b8;
        stroke-dasharray: 7 5;
        opacity: 0.75;
      }

      .edge.active {
        stroke: #1f2937;
        stroke-width: 3;
        opacity: 0.95;
      }

      .edge-label {
        fill: #66736d;
        font: 10px sans-serif;
        pointer-events: none;
      }

      .node circle {
        stroke: #20302a;
        stroke-width: 1.5;
        cursor: grab;
      }

      .node.dragging circle {
        cursor: grabbing;
        stroke-width: 4;
      }

      .node.focus circle {
        fill: #2f6f63;
      }

      .node.context circle {
        fill: #d8a03d;
      }

      .node.path circle {
        fill: #c05a2b;
      }

      .node.active circle {
        stroke: #1f2937;
        stroke-width: 4;
      }

      .node text {
        fill: #17231e;
        font: 12px sans-serif;
        pointer-events: none;
        paint-order: stroke;
        stroke: #fbfaf6;
        stroke-width: 4px;
      }
    </style>
  </head>
  <body>
    <div id="graph-shell">
      <div id="legend">
        <span><span class="legend-mark legend-path"></span>Initial path</span>
        <span><span class="legend-mark legend-focus"></span>Expanded focus</span>
        <span><span class="legend-mark legend-context"></span>Context</span>
      </div>
      <button id="clear-selection" type="button">Clear selection</button>
      <button id="reset-view" type="button">Reset view</button>
      <svg id="kg-subgraph" viewBox="0 0 1000 640" role="img"></svg>
      <div id="node-details">
        Click a node for actions. Drag nodes to reposition. Double-click a node to expand connected neighbors.
      </div>
    </div>

    <script>
      const Streamlit = {
        setComponentReady() {
          window.parent.postMessage(
            { isStreamlitMessage: true, type: "streamlit:componentReady", apiVersion: 1 },
            "*",
          );
        },
        setFrameHeight(height) {
          window.parent.postMessage(
            { isStreamlitMessage: true, type: "streamlit:setFrameHeight", height },
            "*",
          );
        },
        setComponentValue(value) {
          window.parent.postMessage(
            {
              isStreamlitMessage: true,
              type: "streamlit:setComponentValue",
              value,
              dataType: "json",
            },
            "*",
          );
        },
      };

      const ns = "http://www.w3.org/2000/svg";
      const svg = document.getElementById("kg-subgraph");
      const details = document.getElementById("node-details");
      let nodes = [];
      let edges = [];
      let positions = {};
      let dragging = null;
      let panning = null;
      let dragOffset = { x: 0, y: 0 };
      let suppressNextClick = false;
      let lastMessage = "";
      let selectedNodeId = null;
      const defaultViewBox = { x: 0, y: 0, width: 1000, height: 640 };
      let viewBox = { ...defaultViewBox };
      const nodeMargin = 24;

      function make(tag, attrs) {
        const el = document.createElementNS(ns, tag);
        Object.entries(attrs).forEach(([key, value]) => el.setAttribute(key, value));
        return el;
      }

      function svgPoint(event) {
        const point = svg.createSVGPoint();
        point.x = event.clientX;
        point.y = event.clientY;
        return point.matrixTransform(svg.getScreenCTM().inverse());
      }

      function render() {
        svg.replaceChildren();
        applyViewBox();
        const edgeLayer = make("g", {});
        const labelLayer = make("g", {});
        const nodeLayer = make("g", {});
        svg.appendChild(edgeLayer);
        svg.appendChild(labelLayer);
        svg.appendChild(nodeLayer);

        edges.forEach(edge => {
          const source = positions[edge.source];
          const target = positions[edge.target];
          if (!source || !target) return;

          const line = make("line", {
            x1: source.x,
            y1: source.y,
            x2: target.x,
            y2: target.y,
            class: edgeClass(edge),
            "data-id": edge.id,
            "data-source": edge.source,
            "data-target": edge.target,
          });
          edgeLayer.appendChild(line);

          const label = make("text", {
            x: (source.x + target.x) / 2,
            y: (source.y + target.y) / 2,
            class: "edge-label",
          });
          label.textContent = edge.kind === "semantic" ? "similar" : edge.label.replace("biolink:", "");
          labelLayer.appendChild(label);
        });

        nodes.forEach(node => {
          const pos = positions[node.id];
          if (!pos) return;

          const group = make("g", {
            class: nodeClass(node),
            transform: `translate(${pos.x}, ${pos.y})`,
            "data-id": node.id,
          });
          const circle = make("circle", { r: node.is_path_node ? 18 : node.is_focus ? 16 : 13 });
          const text = make("text", { x: 20, y: 4 });
          text.textContent = node.label.length > 38 ? node.label.slice(0, 35) + "..." : node.label;
          group.appendChild(circle);
          group.appendChild(text);
          group.addEventListener("click", () => {
            if (suppressNextClick) return;
            selectNode(node);
          });
          group.addEventListener("dblclick", event => {
            event.preventDefault();
            event.stopPropagation();
            if (!node.unseen_neighbor_count) {
              showMessage("No unseen connected neighbors to expand.");
              return;
            }
            Streamlit.setComponentValue({
              action: "expand_connected",
              node_id: node.id,
              positions,
              nonce: makeNonce(),
            });
          });
          group.addEventListener("pointerdown", event => startDrag(event, node, group));
          nodeLayer.appendChild(group);
        });
        if (selectedNodeId && nodes.some(node => node.id === selectedNodeId)) {
          selectNode(nodes.find(node => node.id === selectedNodeId));
        }
      }

      function edgeClass(edge) {
        const classes = ["edge"];
        if (edge.is_path_edge) classes.push("path");
        if (edge.kind === "semantic") classes.push("semantic");
        return classes.join(" ");
      }

      function nodeClass(node) {
        const classes = ["node"];
        classes.push(node.is_focus ? "focus" : "context");
        if (node.is_path_node) classes.push("path");
        return classes.join(" ");
      }

      function redrawPositions() {
        edges.forEach(edge => {
          const source = positions[edge.source];
          const target = positions[edge.target];
          if (!source || !target) return;
          const line = document.querySelector(`.edge[data-id="${CSS.escape(edge.id)}"]`);
          if (!line) return;
          line.setAttribute("x1", source.x);
          line.setAttribute("y1", source.y);
          line.setAttribute("x2", target.x);
          line.setAttribute("y2", target.y);
        });

        document.querySelectorAll(".edge-label").forEach((label, index) => {
          const edge = edges[index];
          if (!edge) return;
          const source = positions[edge.source];
          const target = positions[edge.target];
          if (!source || !target) return;
          label.setAttribute("x", (source.x + target.x) / 2);
          label.setAttribute("y", (source.y + target.y) / 2);
        });
      }

      function startDrag(event, node, group) {
        event.preventDefault();
        event.stopPropagation();
        group.setPointerCapture(event.pointerId);
        const point = svgPoint(event);
        dragging = { node, group, pointerId: event.pointerId, moved: false };
        dragOffset = {
          x: point.x - positions[node.id].x,
          y: point.y - positions[node.id].y,
        };
        group.classList.add("dragging");
      }

      svg.addEventListener("pointermove", event => {
        if (panning) {
          const point = clientPoint(event);
          const dx = point.x - panning.clientX;
          const dy = point.y - panning.clientY;
          const scaleX = viewBox.width / svg.clientWidth;
          const scaleY = viewBox.height / svg.clientHeight;
          viewBox.x = panning.viewBoxX - dx * scaleX;
          viewBox.y = panning.viewBoxY - dy * scaleY;
          applyViewBox();
          return;
        }

        if (!dragging) return;
        const point = svgPoint(event);
        const next = {
          x: Math.max(nodeMargin, Math.min(defaultViewBox.width - nodeMargin, point.x - dragOffset.x)),
          y: Math.max(nodeMargin, Math.min(defaultViewBox.height - nodeMargin, point.y - dragOffset.y)),
        };
        positions[dragging.node.id] = next;
        dragging.moved = true;
        dragging.group.setAttribute("transform", `translate(${next.x}, ${next.y})`);
        redrawPositions();
      });

      svg.addEventListener("pointerup", event => {
        if (panning) {
          svg.releasePointerCapture(event.pointerId);
          svg.classList.remove("panning");
          panning = null;
          return;
        }

        if (!dragging) return;
        dragging.group.releasePointerCapture(event.pointerId);
        dragging.group.classList.remove("dragging");
        suppressNextClick = dragging.moved;
        dragging = null;
        if (suppressNextClick) {
          window.setTimeout(() => {
            suppressNextClick = false;
          }, 0);
        }
      });

      svg.addEventListener("pointerdown", event => {
        if (event.target.closest(".node")) return;
        event.preventDefault();
        svg.setPointerCapture(event.pointerId);
        svg.classList.add("panning");
        const point = clientPoint(event);
        panning = {
          clientX: point.x,
          clientY: point.y,
          viewBoxX: viewBox.x,
          viewBoxY: viewBox.y,
        };
      });

      function selectNode(node) {
        selectedNodeId = node.id;
        document.querySelectorAll(".node").forEach(el => el.classList.remove("active"));
        document.querySelectorAll(".edge").forEach(el => el.classList.remove("active"));
        document.querySelector(`.node[data-id="${CSS.escape(node.id)}"]`)?.classList.add("active");
        const incident = edges.filter(edge => edge.source === node.id || edge.target === node.id);
        incident.forEach(edge => {
          document.querySelector(`.edge[data-id="${CSS.escape(edge.id)}"]`)?.classList.add("active");
        });
        const labelText = (node.labels || []).join(", ");
        details.innerHTML = `
          <div><strong>${escapeHtml(node.label)}</strong></div>
          <div>${escapeHtml(labelText)}</div>
          <div>Connected edges in view: ${incident.length}</div>
          <div>Unseen connected neighbors: ${node.unseen_neighbor_count || 0}</div>
          <div style="margin-top: 8px; display: flex; gap: 8px; flex-wrap: wrap;">
            <button type="button" data-action="expand_connected" data-node-id="${escapeAttr(node.id)}" ${node.unseen_neighbor_count ? "" : "data-noop='true'"}>Expand connected</button>
            <button type="button" data-action="expand_similar" data-node-id="${escapeAttr(node.id)}">Expand similar</button>
            <button type="button" data-action="collapse" data-node-id="${escapeAttr(node.id)}">Collapse / hide</button>
          </div>
        `;
      }

      function clearSelection() {
        selectedNodeId = null;
        document.querySelectorAll(".node").forEach(el => el.classList.remove("active"));
        document.querySelectorAll(".edge").forEach(el => el.classList.remove("active"));
        details.textContent =
          "Click a node for actions. Drag nodes to reposition. Double-click a node to expand connected neighbors.";
      }

      function showMessage(message) {
        if (!message || message === lastMessage) return;
        lastMessage = message;
        details.textContent = message;
        window.setTimeout(() => {
          if (lastMessage === message) {
            lastMessage = "";
            clearSelection();
          }
        }, 2200);
      }

      function makeNonce() {
        return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
      }

      function clientPoint(event) {
        return { x: event.clientX, y: event.clientY };
      }

      function applyViewBox() {
        svg.setAttribute("viewBox", `${viewBox.x} ${viewBox.y} ${viewBox.width} ${viewBox.height}`);
      }

      document.getElementById("clear-selection").addEventListener("click", event => {
        event.preventDefault();
        event.stopPropagation();
        clearSelection();
      });

      document.getElementById("reset-view").addEventListener("click", event => {
        event.preventDefault();
        event.stopPropagation();
        viewBox = { ...defaultViewBox };
        applyViewBox();
      });

      details.addEventListener("click", event => {
        const button = event.target.closest("button[data-action]");
        if (!button) return;
        event.preventDefault();
        event.stopPropagation();
        if (button.dataset.noop === "true") {
          showMessage("No unseen connected neighbors to expand.");
          return;
        }
        Streamlit.setComponentValue({
          action: button.dataset.action,
          node_id: button.dataset.nodeId,
          positions,
          nonce: makeNonce(),
        });
      });

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function escapeAttr(value) {
        return escapeHtml(value);
      }

      window.addEventListener("message", event => {
        if (!event.data || event.data.type !== "streamlit:render") return;
        nodes = event.data.args.nodes || [];
        edges = event.data.args.edges || [];
        positions = event.data.args.positions || {};
        if (Object.prototype.hasOwnProperty.call(event.data.args, "selected_node_id")) {
          selectedNodeId = event.data.args.selected_node_id || null;
        }
        render();
        showMessage(event.data.args.message || "");
        Streamlit.setFrameHeight(560);
      });

      Streamlit.setComponentReady();
      Streamlit.setFrameHeight(560);
    </script>
  </body>
</html>
