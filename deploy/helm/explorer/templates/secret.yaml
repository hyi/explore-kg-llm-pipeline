{{- if and .Values.env.createSecret (not .Values.env.existingSecret) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "explorer.secretName" . }}
  labels:
    {{- include "explorer.labels" . | nindent 4 }}
type: Opaque
stringData:
  NEO4J_URI: {{ required "env.neo4jUri is required unless env.existingSecret is set" .Values.env.neo4jUri | quote }}
  NEO4J_USERNAME: {{ required "env.neo4jUsername is required unless env.existingSecret is set" .Values.env.neo4jUsername | quote }}
  NEO4J_PASSWORD: {{ required "env.neo4jPassword is required unless env.existingSecret is set" .Values.env.neo4jPassword | quote }}
  OPENAI_API_KEY: {{ required "env.openaiApiKey is required unless env.existingSecret is set" .Values.env.openaiApiKey | quote }}
{{- end }}
